baseURL = 'https://example.org/'
languageCode = 'en-US'
title = 'Wile E. Coyote'

# ---------------------------------------------------------------------------
# Taxonomies
# Hugo requires you to list ALL taxonomies you want, including any you want
# to keep from the defaults (tags, categories). Format: singular = 'plural'.
# The plural form becomes the URL: /publication_types/conference/
# ---------------------------------------------------------------------------
[taxonomies]
  tag              = 'tags'
  publication_type = 'publication_types'
  category         = 'categories'

# ---------------------------------------------------------------------------
# Navigation menu
# pageRef is a root-relative path to the section. Hugo resolves it to the
# section's _index.md. weight controls the order (lower = further left).
# ---------------------------------------------------------------------------
[menus]
  [[menus.main]]
    name    = 'Experience'
    pageRef = '/experience'
    weight  = 10
  [[menus.main]]
    name    = 'Publications'
    pageRef = '/publications'
    weight  = 20
  [[menus.main]]
    name    = 'Patents'
    pageRef = '/patents'
    weight  = 30
  [[menus.main]]
    name    = 'Projects'
    pageRef = '/projects'
    weight  = 40
  [[menus.main]]
    name    = 'Posts'
    pageRef = '/posts'
    weight  = 50
  [[menus.main]]
    name    = 'Contact'
    pageRef = '/contact'
    weight  = 60

# ---------------------------------------------------------------------------
# Module / version constraint
# This tells Hugo to refuse to build if the Hugo version is too old.
# extended = false means we don't need Hugo Extended (which adds Sass/SCSS).
# We're using plain CSS, so the regular binary is fine.
# ---------------------------------------------------------------------------
# Summary length for post list pages (in words, Hugo default is 70).
# We use .Content | plainify | truncate 500 in templates for character-accurate
# truncation, so this setting is less critical but good to set explicitly.
summaryLength = 100

[module]
  [module.hugoVersion]
    extended = false
    min      = '0.146.0'

# ---------------------------------------------------------------------------
# Theme parameters
# All of these are available in templates as site.Params.<key>.
# Provide sensible defaults here; users override in their site's hugo.toml.
# ---------------------------------------------------------------------------
[params]
  # --- Identity ---
  # author_name is used in two places:
  #   1. author_list.html bolds your name in author lists
  #   2. JSON-LD Person schema (later)
  author_name  = "Wile E. Coyote"
  author_title = "Genius"
  author_email = "coyote@acme.com"

  # --- Homepage section limits ---
  # How many items to show in each homepage hero section before "see all".
  home_publications_count = 3
  home_patents_count      = 3
  home_posts_count        = 4
  home_projects_count     = 3
  home_experience_count   = 4

  # --- Integrations (leave blank to disable) ---
  google_analytics = ""   # e.g. "G-XXXXXXXXXX"
  disqus_shortname = ""   # e.g. "mysite"

  # --- Publication type accent colours ---
  # These feed into CSS custom properties via Hugo Pipes (see assets/css/main.css).
  # You can override any or all of these in your site's hugo.toml.
  # Values are any valid CSS colour: hex, rgb(), hsl(), etc.
  [params.pub_colors]
    conference   = "#378ADD"
    journal      = "#1D9E75"
    preprint     = "#EF9F27"
    thesis       = "#7F77DD"
    book         = "#D85A30"
    bookchapter  = "#D85A30"   # same family as book
    other        = "#888780"

  # --- Dark mode ---
  # "auto"  = respect the OS prefers-color-scheme setting
  # "light" = always light
  # "dark"  = always dark
  dark_mode = "auto"

[markup]
  [markup.goldmark]
    duplicateResourceFiles = false
    [markup.goldmark.extensions]
      definitionList = true
      linkify = true
      linkifyProtocol = 'https'
      strikethrough = true
      table = true
      taskList = true
      [markup.goldmark.extensions.cjk]
        eastAsianLineBreaks = false
        eastAsianLineBreaksStyle = 'simple'
        enable = false
        escapedSpace = false
      [markup.goldmark.extensions.extras]
        [markup.goldmark.extensions.extras.delete]
          enable = true
        [markup.goldmark.extensions.extras.insert]
          enable = true
        [markup.goldmark.extensions.extras.mark]
          enable = true
        [markup.goldmark.extensions.extras.subscript]
          enable = true
        [markup.goldmark.extensions.extras.superscript]
          enable = true
      [markup.goldmark.extensions.footnote]
        backlinkHTML = '&#x21a9;&#xfe0e;'
        enable = true
        enableAutoIDPrefix = false
      [markup.goldmark.extensions.passthrough]
        enable = false
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = ['\(', '\)']
      [markup.goldmark.extensions.typographer]
        apostrophe = '&rsquo;'
        disable = false
        ellipsis = '&hellip;'
        emDash = '&mdash;'
        enDash = '&ndash;'
        leftAngleQuote = '&laquo;'
        leftDoubleQuote = '&ldquo;'
        leftSingleQuote = '&lsquo;'
        rightAngleQuote = '&raquo;'
        rightDoubleQuote = '&rdquo;'
        rightSingleQuote = '&rsquo;'
    [markup.goldmark.parser]
      autoDefinitionTermID = false
      autoHeadingID = true
      autoIDType = 'github'
      wrapStandAloneImageWithinParagraph = true
      [markup.goldmark.parser.attribute]
        block = false
        title = true
    [markup.goldmark.renderHooks]
      [markup.goldmark.renderHooks.image]
        useEmbedded = 'never'
      [markup.goldmark.renderHooks.link]
        useEmbedded = 'never'
    [markup.goldmark.renderer]
      hardWraps = false
      unsafe = true
      xhtml = false

[outputs]
  home    = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
