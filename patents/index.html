<script>
  (function () {
    var saved    = localStorage.getItem('theme');
    var sitePref = "\"auto\"";
    var theme;

    if (saved === 'dark' || saved === 'light') {
      theme = saved;
    } else if (sitePref === 'dark' || sitePref === 'light') {
      theme = sitePref;
    } else {
      
      theme = window.matchMedia('(prefers-color-scheme: dark)').matches
        ? 'dark' : 'light';
    }

    document.documentElement.setAttribute('data-bs-theme', theme);
  })();

<div class="modal fade"
     id="bibtex-modal"
     tabindex="-1"
     aria-labelledby="bibtex-modal-label"
     aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="bibtex-modal-label">BibTeX</h5>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <textarea id="bibtex-modal-text"
                  class="bibtex-textarea form-control"
                  rows="14"
                  readonly
                  spellcheck="false"></textarea>
      </div>
      <div class="modal-footer">
        <button type="button"
                class="btn btn-primary btn-sm"
                id="bibtex-copy-btn"
                onclick="
                  var el = document.getElementById('bibtex-modal-text');
                  if (navigator.clipboard) {
                    navigator.clipboard.writeText(el.value).then(function() {
                      var btn = document.getElementById('bibtex-copy-btn');
                      btn.textContent = 'Copied!';
                      setTimeout(function() {
                        btn.textContent = 'Copy to clipboard';
                      }, 1500);
                    });
                  } else {
                    el.select();
                    document.execCommand('copy');
                  }
                ">
          Copy to clipboard
        </button>
        <button type="button"
                class="btn btn-secondary btn-sm"
                data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>


<script>
  document.getElementById('bibtex-modal').addEventListener('show.bs.modal', function(e) {
    var btn    = e.relatedTarget;
    var bibtex = btn ? btn.getAttribute('data-bibtex') : '';
    document.getElementById('bibtex-modal-text').value = bibtex || '';
  });

<script>
  function filterPatents(filter) {
    var items   = document.querySelectorAll('.patent-item');
    var buttons = document.querySelectorAll('[data-filter]');
    var empty   = document.getElementById('patent-empty');
    var visible = 0;

    buttons.forEach(function(btn) {
      var isActive = btn.getAttribute('data-filter') === filter;
      btn.classList.toggle('btn-primary',           isActive);
      btn.classList.toggle('btn-outline-secondary', !isActive);
    });

    items.forEach(function(item) {
      var show = filter === 'all' || item.getAttribute('data-status') === filter;
      item.style.display = show ? '' : 'none';
      if (show) visible++;
    });

    empty.style.display = visible === 0 ? '' : 'none';
  }
</script>
